  <rect x="72" y="425" width="90" height="5" fill="#20d6ca"/>
  <text x="72" y="480" fill="#d9e3e5" font-family="Arial,sans-serif" font-size="24"><tspan x="72">Why AI costs balloon when leadership automates</tspan><tspan x="72" dy="34">before it understands the work</tspan></text>
