<svg xmlns="http://www.w3.org/2000/svg" width="850" height="1100" viewBox="0 0 850 1100" role="img" aria-labelledby="title desc">
  <title id="title">Running Before Crawling</title><desc id="desc">Board and C-Suite Executive Edition by Sudeep Arya. Workflow and truth pass through cost and a human gate to produce a verified outcome.</desc>
